<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Electrode Positions on VGGT Reconstruction</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1923;overflow:hidden;font-family:'Noto Sans',-apple-system,sans-serif}
#c{width:100vw;height:100vh;position:relative}canvas{display:block}
#ld{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0f1923;z-index:10;transition:opacity .6s}
#ld.h{opacity:0;pointer-events:none}
.sp{width:36px;height:36px;border:3px solid rgba(0,171,217,.15);border-top-color:#00ABD9;border-radius:50%;animation:s .8s linear infinite;margin-bottom:14px}
@keyframes s{to{transform:rotate(360deg)}}
#ld span{color:rgba(255,255,255,.5);font-size:13px}
#tt{position:absolute;display:none;pointer-events:none;background:rgba(0,62,107,.92);color:#fff;padding:5px 12px;border-radius:6px;font-size:13px;font-weight:600;letter-spacing:.5px;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,.3);transform:translate(-50%,-140%);z-index:20}
#tt::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:rgba(0,62,107,.92)}
#tt.lm{background:rgba(238,113,0,.92)}#tt.lm::after{border-top-color:rgba(238,113,0,.92)}
#ct{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:linear-gradient(transparent,rgba(15,25,35,.9));opacity:0;transition:opacity .3s;z-index:5}
#c:hover #ct{opacity:1}
#ct .h{color:rgba(255,255,255,.4);font-size:11px}
.rc{display:flex;align-items:center;gap:12px}
.cg{display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.5);font-size:11px}
.cg input{width:50px;height:3px;accent-color:#00ABD9;cursor:pointer}
.cb{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.5);font-size:11px;padding:3px 10px;border-radius:4px;cursor:pointer;transition:all .2s}
.cb:hover{background:rgba(0,171,217,.15);border-color:rgba(0,171,217,.3);color:rgba(255,255,255,.8)}
.cb.a{background:rgba(0,171,217,.25);border-color:#00ABD9;color:#fff}
#lg{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:4px;z-index:5;opacity:0;transition:opacity .3s}
#c:hover #lg{opacity:1}
.li{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.45);font-size:10px}
.ld2{width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(255,255,255,.25)}
#inf{position:absolute;top:10px;right:10px;color:rgba(255,255,255,.2);font-size:10px;z-index:5}
</style>
</head>
<body>
<div id="c">
<div id="ld"><div class="sp"></div><span>Loading 3D reconstruction...</span></div>
<div id="tt"></div><div id="inf"></div>
<div id="lg">
<div class="li"><div class="ld2" style="background:#00ABD9"></div>Electrodes</div>
<div class="li"><div class="ld2" style="background:#EE7100"></div>Landmarks</div>
<div class="li"><div class="ld2" style="background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.1)"></div>VGGT Point Cloud</div>
</div>
<div id="ct">
<span class="h">Drag to rotate · Scroll to zoom · Hover for labels</span>
<div class="rc">
<div class="cg"><span>Points</span><input type="range" id="sp" min="0.5" max="6" step="0.5" value="2.5"></div>
<div class="cg"><span>Electrodes</span><input type="range" id="se" min="0.3" max="2.5" step="0.1" value="1"></div>
<button class="cb" id="bl">Labels</button>
<button class="cb a" id="bc">Cloud</button>
<button class="cb" id="br">Reset</button>
</div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function(){
const EL={"NAS": {"position": [-0.0016112278136561596, -0.10900008958127703, -0.12289235932413978], "type": "landmark"}, "LPA": {"position": [0.1305454953621441, -0.09339476033170721, 0.04818654247494503], "type": "landmark"}, "RPA": {"position": [-0.14585340048218795, -0.07932562616553812, 0.026528746419840266], "type": "landmark"}, "E0": {"position": [-0.04312087866247223, -0.04584227534122913, -0.13224520156091668], "type": "electrode"}, "E1": {"position": [0.06190366841161098, -0.05187515907561892, -0.11698735064436949], "type": "electrode"}, "E2": {"position": [0.11652074725372276, -0.06321068528272175, -0.038775288413521514], "type": "electrode"}, "E3": {"position": [0.13297677253067486, -0.06960278824488278, 0.04561138237425766], "type": "electrode"}, "E4": {"position": [0.1003183541831792, 0.0331610866160951, 0.06649061375438658], "type": "electrode"}, "E5": {"position": [0.11363708127349034, -0.02981330058372461, 0.1102093791087122], "type": "electrode"}, "E6": {"position": [0.11816914553981299, -0.15404596347656782, 0.09504724981543533], "type": "electrode"}, "E7": {"position": [0.07407886627943668, -0.007519914287859947, 0.1631475165564611], "type": "electrode"}, "E8": {"position": [0.04999203798231792, 0.05782063249724437, 0.12087894120714515], "type": "electrode"}, "E9": {"position": [-0.00435938828633371, 0.06997467649041475, 0.11502840468422271], "type": "electrode"}, "E10": {"position": [0.030311593934425913, -0.09373714912384953, 0.18845028245368245], "type": "electrode"}, "E11": {"position": [-0.013710696733894742, 0.03266591228199797, 0.16327436874814394], "type": "electrode"}, "E12": {"position": [-0.0002443238295864198, 0.08564446830368547, 0.05597029566753142], "type": "electrode"}, "E13": {"position": [0.06355541773753708, 0.056966612341496886, 0.00031201375841105605], "type": "electrode"}, "E14": {"position": [-0.04261451305780715, 0.06372950236639138, -0.007116792286579687], "type": "electrode"}, "E15": {"position": [-0.05112238232445682, 0.049271867336640435, 0.1122438945359423], "type": "electrode"}, "E16": {"position": [-0.1027340212548039, 0.04500772152715729, 0.03793270173976149], "type": "electrode"}, "E17": {"position": [-0.09135938137771313, -0.0005172520062916297, 0.14667466133718987], "type": "electrode"}, "E18": {"position": [-0.056738760257018066, -0.09335456768076587, 0.1815737838343403], "type": "electrode"}, "E19": {"position": [-0.12928705548661945, -0.018822566635410792, 0.09112879171365407], "type": "electrode"}, "E20": {"position": [-0.14377019813802974, -0.13477485696318148, 0.08531417022719445], "type": "electrode"}, "E21": {"position": [-0.14464735764449219, -0.04985467799344595, 0.022123939495770406], "type": "electrode"}, "E22": {"position": [-0.11724039046583855, -0.04412512003338967, -0.0630633895499697], "type": "electrode"}, "E23": {"position": [0.014409361577519476, 0.047154106454498995, -0.06086527856321222], "type": "electrode"}};
const c=document.getElementById('c'),ld=document.getElementById('ld'),tt=document.getElementById('tt'),inf=document.getElementById('inf');
const sc=new THREE.Scene();sc.background=new THREE.Color(0x0f1923);
const cam=new THREE.PerspectiveCamera(50,c.clientWidth/c.clientHeight,.001,50);
cam.position.set(.15,.1,.5);
const ren=new THREE.WebGLRenderer({antialias:true});
ren.setSize(c.clientWidth,c.clientHeight);ren.setPixelRatio(Math.min(window.devicePixelRatio,2));
c.appendChild(ren.domElement);
const oc=new THREE.OrbitControls(cam,ren.domElement);
oc.enableDamping=true;oc.dampingFactor=.06;oc.rotateSpeed=.7;
oc.autoRotate=true;oc.autoRotateSpeed=.6;oc.maxDistance=3;oc.minDistance=.05;
sc.add(new THREE.AmbientLight(0xffffff,.6));
const dl=new THREE.DirectionalLight(0xffffff,.4);dl.position.set(2,3,4);sc.add(dl);
const d2=new THREE.DirectionalLight(0x88aacc,.2);d2.position.set(-3,-1,-2);sc.add(d2);

let pc=null,ems=[],ls=[],sL=false,iCP,iCT;
const rc=new THREE.Raycaster(),ms=new THREE.Vector2();let hov=null;
const CE=new THREE.Color(0x00ABD9),CEH=new THREE.Color(0x00E5FF);
const CL=new THREE.Color(0xEE7100),CLH=new THREE.Color(0xFFAA44);

// Load point cloud from external binary file
fetch('vggt_head.bin')
  .then(r=>{if(!r.ok)throw new Error('Not found');return r.arrayBuffer();})
  .then(buf=>{
    const dv=new DataView(buf);const raw=new Uint8Array(buf);
    const n=dv.getUint32(0,true);
    const pos=new Float32Array(n*3),col=new Float32Array(n*3);
    let o=4;
    for(let i=0;i<n;i++){
      pos[i*3]=dv.getFloat32(o,true);o+=4;
      pos[i*3+1]=dv.getFloat32(o,true);o+=4;
      pos[i*3+2]=dv.getFloat32(o,true);o+=4;
      col[i*3]=raw[o++]/255;col[i*3+1]=raw[o++]/255;col[i*3+2]=raw[o++]/255;
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color',new THREE.BufferAttribute(col,3));
    geo.computeBoundingSphere();
    pc=new THREE.Points(geo,new THREE.PointsMaterial({size:.0025,vertexColors:true,sizeAttenuation:true,transparent:true,opacity:.9}));
    sc.add(pc);
    inf.textContent=n.toLocaleString()+' points · 24 electrodes · 3 landmarks';
    const sp=geo.boundingSphere;
    cam.position.set(sp.center.x+sp.radius*.3,sp.center.y+sp.radius*.4,sp.center.z+sp.radius*1.8);
    oc.target.copy(sp.center);oc.update();
    iCP=cam.position.clone();iCT=oc.target.clone();
    ld.classList.add('h');
  })
  .catch(e=>{console.error(e);ld.querySelector('span').textContent='Failed to load';});

// Electrodes
const eg=new THREE.SphereGeometry(1,16,12);
function mkL(t,isL){const cv=document.createElement('canvas'),cx=cv.getContext('2d');cv.width=256;cv.height=80;cx.font='bold 44px "Noto Sans",sans-serif';const tw=cx.measureText(t).width,pw=tw+24,ph=56,x=(cv.width-pw)/2,y=(cv.height-ph)/2;cx.fillStyle=isL?'rgba(238,113,0,.9)':'rgba(0,62,107,.9)';cx.beginPath();cx.roundRect(x,y,pw,ph,10);cx.fill();cx.fillStyle='#fff';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(t,cv.width/2,cv.height/2);const tx=new THREE.CanvasTexture(cv);tx.minFilter=THREE.LinearFilter;const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tx,transparent:true,depthTest:false}));sp.scale.set(.038,.012,1);return sp;}

Object.entries(EL).forEach(([nm,d])=>{
  const isL=d.type==='landmark',bc=isL?CL:CE,sz=isL?.005:.004;
  const mt=new THREE.MeshPhongMaterial({color:bc,emissive:bc.clone().multiplyScalar(.35),shininess:80,transparent:true,opacity:.95});
  const m=new THREE.Mesh(eg,mt);m.position.set(...d.position);m.scale.setScalar(sz);
  m.userData={name:nm,type:d.type,baseColor:bc.clone(),baseSize:sz};sc.add(m);ems.push(m);
  const lb=mkL(nm,isL);lb.position.set(d.position[0],d.position[1]+sz*3.5,d.position[2]);lb.visible=false;sc.add(lb);ls.push(lb);
});

// Hover
ren.domElement.addEventListener('mousemove',function(e){
  const r=ren.domElement.getBoundingClientRect();
  ms.x=((e.clientX-r.left)/r.width)*2-1;ms.y=-((e.clientY-r.top)/r.height)*2+1;
  rc.setFromCamera(ms,cam);const h=rc.intersectObjects(ems);
  if(h.length>0){const m=h[0].object;if(hov!==m){if(hov){const p=hov.userData;hov.material.color.copy(p.baseColor);hov.material.emissive.copy(p.baseColor).multiplyScalar(.35);hov.scale.setScalar(p.baseSize);}hov=m;const hc=m.userData.type==='landmark'?CLH:CEH;m.material.color.copy(hc);m.material.emissive.copy(hc).multiplyScalar(.5);m.scale.setScalar(m.userData.baseSize*1.5);tt.textContent=m.userData.name;tt.className=m.userData.type==='landmark'?'lm':'';tt.style.display='block';}
  const p2=m.position.clone().project(cam),r2=ren.domElement.getBoundingClientRect();tt.style.left=((p2.x+1)/2*r2.width)+'px';tt.style.top=((-p2.y+1)/2*r2.height)+'px';ren.domElement.style.cursor='pointer';
  }else{if(hov){const p=hov.userData;hov.material.color.copy(p.baseColor);hov.material.emissive.copy(p.baseColor).multiplyScalar(.35);hov.scale.setScalar(p.baseSize);hov=null;}tt.style.display='none';ren.domElement.style.cursor='grab';}
});

// Controls
document.getElementById('sp').addEventListener('input',e=>{if(pc)pc.material.size=parseFloat(e.target.value)*.001;});
document.getElementById('se').addEventListener('input',e=>{const s=parseFloat(e.target.value);ems.forEach(m=>m.scale.setScalar(m.userData.baseSize*s));});
const bL=document.getElementById('bl');bL.addEventListener('click',()=>{sL=!sL;bL.classList.toggle('a',sL);ls.forEach(s=>s.visible=sL);});
const bC=document.getElementById('bc');bC.addEventListener('click',()=>{if(pc){pc.visible=!pc.visible;bC.classList.toggle('a',pc.visible);}});
document.getElementById('br').addEventListener('click',()=>{if(iCP){cam.position.copy(iCP);oc.target.copy(iCT);oc.autoRotate=true;oc.update();}});
oc.addEventListener('start',()=>{oc.autoRotate=false;});
function a(){requestAnimationFrame(a);oc.update();ren.render(sc,cam);}a();
window.addEventListener('resize',()=>{cam.aspect=c.clientWidth/c.clientHeight;cam.updateProjectionMatrix();ren.setSize(c.clientWidth,c.clientHeight);});
})();
</script>
</body>
</html>
