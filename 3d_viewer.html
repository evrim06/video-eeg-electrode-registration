<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Electrode Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; overflow: hidden; }
  canvas { display: block; }
  #info {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Noto Sans', Arial, sans-serif;
    font-size: 0.8rem;
    color: #888;
    pointer-events: none;
  }
  #tooltip {
    position: absolute;
    display: none;
    background: rgba(0,62,107,0.92);
    color: #fff;
    padding: 6px 14px;
    border-radius: 6px;
    font-family: 'Noto Sans', Arial, sans-serif;
    font-size: 0.82rem;
    pointer-events: none;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>
<div id="tooltip"></div>
<div id="info">Drag to rotate · Scroll to zoom · Hover for labels</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// DATA — pipeline coords: X=left-right, Y=back-front, Z=up
// Three.js mapping: X=pipeline_X, Y=pipeline_Z, Z=-pipeline_Y
// ============================================================
function toThree(p) { return [p[0], p[2], -p[1]]; }

const landmarks = {
  "NAS":   { pos: [3.086, 93.376, -6.249], color: 0xEE7100 },
  "LPA":   { pos: [-80.25, 0, 0],          color: 0x00ABD9 },
  "RPA":   { pos: [80.25, 0, 0],            color: 0x00ABD9 },
  "INION": { pos: [0, -98.903, -6.249],     color: 0xEE7100 }
};

const electrodes = {
  "FP2": [29.254, 94.229, 29.150],   "FP1": [-32.069, 90.218, 28.465],
  "F7": [-67.370, 48.084, 20.499],   "T7": [-80.836, 0.550, 13.884],
  "C3": [-59.967, -17.321, 71.133],  "TP9": [-71.451, -39.148, 33.509],
  "CP5": [-77.016, -24.835, -37.251],"P3": [-50.414, -72.248, 42.881],
  "CP1": [-32.727, -51.819, 81.457], "CZ": [-0.819, -51.312, 86.928],
  "O1": [-28.887, -84.921, -9.226],  "CPZ": [1.295, -77.828, 63.158],
  "FZ": [-0.065, -17.862, 98.513],   "FC1": [-35.121, 18.117, 86.365],
  "FC2": [26.529, 17.546, 87.110],   "CP2": [25.619, -50.814, 73.601],
  "C4": [58.557, -10.115, 72.523],   "P4": [45.770, -70.168, 42.209],
  "O2": [21.546, -84.713, -11.554],  "TP10": [69.572, -39.062, 32.719],
  "CP6": [74.774, -31.297, -34.276], "T8": [80.618, 1.303, 17.189],
  "F8": [68.851, 51.205, 24.883],    "PZ": [-4.358, 51.611, 81.632]
};

// ============================================================
// Best-fit ellipsoid (computed from electrode positions)
// Center in Three.js: (-0.7, 1.3, -1.8)
// Radii: (83.5, 98.4, 98.0) — use 93% so electrodes sit outside
// ============================================================
const HC = { x: -0.7, y: 1.3, z: -1.8 };  // head center
const HR = { x: 77, y: 91, z: 90 };        // head radii (93% of fit)

// Landmark positions in Three.js
const NAS_3 = toThree(landmarks.NAS.pos);   // (3, -6, -93) = front
const INION_3 = toThree(landmarks.INION.pos); // (0, -6, 99) = back
const LPA_3 = toThree(landmarks.LPA.pos);   // (-80, 0, 0) = left
const RPA_3 = toThree(landmarks.RPA.pos);   // (80, 0, 0) = right

// ============================================================
// SCENE
// ============================================================
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x000000, 0);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.55));

const keyLight = new THREE.DirectionalLight(0xffffff, 0.8);
keyLight.position.set(80, 180, -120);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xddeeff, 0.3);
fillLight.position.set(-80, -40, 80);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffffff, 0.2);
rimLight.position.set(0, -80, 120);
scene.add(rimLight);

const headGroup = new THREE.Group();
scene.add(headGroup);

// ============================================================
// HEAD — data-fitted ellipsoid with jaw taper
// ============================================================
const headGeo = new THREE.SphereGeometry(1, 64, 48);
const pos = headGeo.attributes.position;

for (let i = 0; i < pos.count; i++) {
  let x = pos.getX(i);
  let y = pos.getY(i);
  let z = pos.getZ(i);

  // Scale to ellipsoid
  x *= HR.x;
  y *= HR.y;
  z *= HR.z;

  // Taper the bottom (jaw/chin) — below center
  if (y < -15) {
    const t = Math.max(0, Math.min(1, (y + HR.y) / (HR.y - 15)));
    const jawFactor = 0.55 + 0.45 * t;
    x *= jawFactor;
    z *= jawFactor;
  }

  // Flatten back of head slightly
  if (z > 40) {
    z *= 0.93;
  }

  // Slight forehead bulge
  if (y > 20 && y < 60 && z < -50) {
    z -= 6 * Math.max(0, 1 - Math.abs(x) / 50);
  }

  pos.setXYZ(i, x, y, z);
}
headGeo.computeVertexNormals();

const headMesh = new THREE.Mesh(headGeo, new THREE.MeshPhysicalMaterial({
  color: 0xe8ddd0,
  roughness: 0.6,
  transparent: true,
  opacity: 0.7,
  clearcoat: 0.2,
  side: THREE.DoubleSide,
}));
headMesh.position.set(HC.x, HC.y, HC.z);
headGroup.add(headMesh);

// ============================================================
// NOSE — positioned near NAS (front of head, between brows)
// NAS in Three.js is at z=-93, so front is negative Z
// ============================================================
const noseGeo = new THREE.SphereGeometry(1, 16, 16);
const nPos = noseGeo.attributes.position;
for (let i = 0; i < nPos.count; i++) {
  let x = nPos.getX(i) * 7;
  let y = nPos.getY(i) * 12;
  let z = nPos.getZ(i) * 10;
  if (y < 0) { x *= (1 + y / 25); z *= (1 + y / 30); }
  nPos.setXYZ(i, x, y, z);
}
noseGeo.computeVertexNormals();

const noseMesh = new THREE.Mesh(noseGeo, new THREE.MeshPhysicalMaterial({
  color: 0xe8ddd0, roughness: 0.6, transparent: true, opacity: 0.72,
}));
// Place below and in front of NAS
noseMesh.position.set(HC.x, HC.y - 30, HC.z - HR.z - 3);
headGroup.add(noseMesh);

// ============================================================
// EARS — at LPA/RPA (ear canal level)
// ============================================================
function createEar(sideX) {
  const earGeo = new THREE.SphereGeometry(1, 16, 12);
  const ear = new THREE.Mesh(earGeo, new THREE.MeshPhysicalMaterial({
    color: 0xddd0c4, roughness: 0.6, transparent: true, opacity: 0.72,
  }));
  ear.scale.set(7, 16, 5);
  ear.position.set(sideX, LPA_3[1], LPA_3[2]);
  ear.rotation.z = Math.sign(sideX) * 0.15;
  headGroup.add(ear);
}
createEar(HC.x - HR.x - 4);  // left ear
createEar(HC.x + HR.x + 4);  // right ear

// ============================================================
// FACE — eyes and smile on the FRONT (negative Z side)
// Positioned relative to NAS which is between the brows
// ============================================================
const faceMat = new THREE.MeshBasicMaterial({ color: 0x555555 });

// Eyes — slightly above and to sides of nose, at the head surface
const eyeY = HC.y - 5;
const eyeZ = HC.z - HR.z + 3;

const leftEye = new THREE.Mesh(new THREE.SphereGeometry(4, 16, 16), faceMat);
leftEye.scale.set(1, 1.4, 0.4);
leftEye.position.set(HC.x - 18, eyeY, eyeZ);
headGroup.add(leftEye);

const rightEye = new THREE.Mesh(new THREE.SphereGeometry(4, 16, 16), faceMat);
rightEye.scale.set(1, 1.4, 0.4);
rightEye.position.set(HC.x + 18, eyeY, eyeZ);
headGroup.add(rightEye);

// Pupils
const pupilMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(2, 12, 12), pupilMat);
leftPupil.position.set(HC.x - 18, eyeY - 1, eyeZ - 2);
headGroup.add(leftPupil);

const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(2, 12, 12), pupilMat);
rightPupil.position.set(HC.x + 18, eyeY - 1, eyeZ - 2);
headGroup.add(rightPupil);

// Smile — parabolic arc
const smileY = HC.y - 38;
const smileZ = HC.z - HR.z + 2;
for (let a = -0.7; a <= 0.7; a += 0.08) {
  const dot = new THREE.Mesh(new THREE.SphereGeometry(1.8, 8, 8), faceMat);
  dot.position.set(
    HC.x + a * 28,
    smileY + a * a * 18,
    smileZ
  );
  headGroup.add(dot);
}
// ============================================================
// ELECTRODES & LANDMARKS
// ============================================================
const spheres = [];
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function addPoint(name, pipelinePos, color, radius, isLandmark) {
  const p = toThree(pipelinePos);
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(radius, 24, 24),
    new THREE.MeshPhysicalMaterial({
      color, roughness: 0.25, metalness: 0.15,
      clearcoat: 0.6, emissive: color, emissiveIntensity: 0.1,
    })
  );
  mesh.position.set(p[0], p[1], p[2]);
  mesh.userData.label = name;
  headGroup.add(mesh);
  spheres.push(mesh);

  if (isLandmark) {
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(radius + 1.8, 0.8, 8, 32),
      new THREE.MeshBasicMaterial({ color })
    );
    ring.position.copy(mesh.position);
    ring.lookAt(HC.x, HC.y, HC.z);
    headGroup.add(ring);
  }
}

for (const [n, p] of Object.entries(electrodes)) addPoint(n, p, 0x666699, 4.0, false);
for (const [n, d] of Object.entries(landmarks))  addPoint(n, d.pos, d.color, 5.5, true);

// ============================================================
// CONTROLS
// ============================================================
let isDragging = false, prevM = { x: 0, y: 0 };
let rotX = -0.1, rotY = 0, zoom = 340;
let autoRotate = true, autoTimer;

function startDrag(x, y) {
  isDragging = true; autoRotate = false;
  clearTimeout(autoTimer);
  prevM = { x, y };
}
function moveDrag(x, y) {
  if (!isDragging) return;
  rotY += (x - prevM.x) * 0.008;
  rotX += (y - prevM.y) * 0.008;
  rotX = Math.max(-1.4, Math.min(1.4, rotX));
  prevM = { x, y };
}
function endDrag() {
  isDragging = false;
  autoTimer = setTimeout(() => { autoRotate = true; }, 3000);
}

const c = renderer.domElement;
c.addEventListener('mousedown', e => startDrag(e.clientX, e.clientY));
c.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  moveDrag(e.clientX, e.clientY);
});
c.addEventListener('mouseup', endDrag);
c.addEventListener('mouseleave', () => { isDragging = false; });
c.addEventListener('wheel', e => {
  zoom = Math.max(180, Math.min(600, zoom + e.deltaY * 0.3));
  e.preventDefault();
}, { passive: false });
c.addEventListener('touchstart', e => {
  if (e.touches.length === 1) startDrag(e.touches[0].clientX, e.touches[0].clientY);
});
c.addEventListener('touchmove', e => {
  if (e.touches.length === 1) moveDrag(e.touches[0].clientX, e.touches[0].clientY);
  e.preventDefault();
}, { passive: false });
c.addEventListener('touchend', endDrag);

// ============================================================
// RENDER
// ============================================================
const tooltip = document.getElementById('tooltip');
const lookAt = new THREE.Vector3(HC.x, HC.y, HC.z);

function animate() {
  requestAnimationFrame(animate);
  if (autoRotate) rotY += 0.004;

  camera.position.x = lookAt.x + zoom * Math.sin(rotY) * Math.cos(rotX);
  camera.position.y = lookAt.y + zoom * Math.sin(rotX);
  camera.position.z = lookAt.z + zoom * Math.cos(rotY) * Math.cos(rotX);
  camera.lookAt(lookAt);

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(spheres);
  if (hits.length > 0 && !isDragging) {
    const obj = hits[0].object;
    tooltip.style.display = 'block';
    const sp = obj.position.clone().project(camera);
    tooltip.style.left = ((sp.x + 1) / 2 * window.innerWidth) + 'px';
    tooltip.style.top  = ((-sp.y + 1) / 2 * window.innerHeight - 35) + 'px';
    tooltip.textContent = obj.userData.label;
    document.body.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    document.body.style.cursor = isDragging ? 'grabbing' : 'grab';
  }
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
