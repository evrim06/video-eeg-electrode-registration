<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Electrode Positions on VGGT Reconstruction</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1923; overflow: hidden; font-family: 'Noto Sans', -apple-system, sans-serif; }
  
  #container { width: 100vw; height: 100vh; position: relative; }
  canvas { display: block; }
  
  /* Loading */
  #loading {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #0f1923; z-index: 10; transition: opacity 0.6s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(0,171,217,0.15); border-top-color: #00ABD9;
    border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading span { color: rgba(255,255,255,0.5); font-size: 13px; }
  
  /* Tooltip */
  #tooltip {
    position: absolute; display: none; pointer-events: none;
    background: rgba(0,62,107,0.92); color: #fff;
    padding: 5px 12px; border-radius: 6px; font-size: 13px; font-weight: 600;
    letter-spacing: 0.5px; white-space: nowrap;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    transform: translate(-50%, -140%);
    z-index: 20;
  }
  #tooltip::after {
    content: ''; position: absolute; top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: rgba(0,62,107,0.92);
  }
  #tooltip.landmark { background: rgba(238,113,0,0.92); }
  #tooltip.landmark::after { border-top-color: rgba(238,113,0,0.92); }
  
  /* Controls */
  #controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px;
    background: linear-gradient(transparent, rgba(15,25,35,0.9));
    opacity: 0; transition: opacity 0.3s; z-index: 5;
  }
  #container:hover #controls { opacity: 1; }
  
  #controls .hint { color: rgba(255,255,255,0.4); font-size: 11px; }
  
  .right-controls { display: flex; align-items: center; gap: 14px; }
  
  .ctrl-group {
    display: flex; align-items: center; gap: 6px;
    color: rgba(255,255,255,0.5); font-size: 11px;
  }
  .ctrl-group input[type="range"] { width: 55px; height: 3px; accent-color: #00ABD9; cursor: pointer; }
  
  .ctrl-btn {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.5); font-size: 11px; padding: 3px 10px;
    border-radius: 4px; cursor: pointer; transition: all 0.2s;
  }
  .ctrl-btn:hover { background: rgba(0,171,217,0.15); border-color: rgba(0,171,217,0.3); color: rgba(255,255,255,0.8); }
  .ctrl-btn.active { background: rgba(0,171,217,0.25); border-color: #00ABD9; color: #fff; }
  
  /* Legend */
  #legend {
    position: absolute; top: 12px; left: 12px;
    display: flex; flex-direction: column; gap: 5px;
    z-index: 5; opacity: 0; transition: opacity 0.3s;
  }
  #container:hover #legend { opacity: 1; }
  
  .legend-item {
    display: flex; align-items: center; gap: 7px;
    color: rgba(255,255,255,0.5); font-size: 10px; letter-spacing: 0.3px;
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.3);
  }
  
  /* Info */
  #info {
    position: absolute; top: 12px; right: 12px;
    color: rgba(255,255,255,0.2); font-size: 10px; z-index: 5; letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div id="container">
  <div id="loading"><div class="spinner"></div><span>Loading 3D reconstruction...</span></div>
  <div id="tooltip"></div>
  <div id="info"></div>
  
  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#00ABD9;"></div>Electrodes (24)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#EE7100;"></div>Landmarks</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.1);"></div>VGGT Point Cloud</div>
  </div>
  
  <div id="controls">
    <span class="hint">Drag to rotate · Scroll to zoom · Hover electrodes for labels</span>
    <div class="right-controls">
      <div class="ctrl-group">
        <span>Points</span>
        <input type="range" id="sl-points" min="0" max="10" step="0.5" value="2.5">
      </div>
      <div class="ctrl-group">
        <span>Electrodes</span>
        <input type="range" id="sl-elec" min="0.5" max="3" step="0.25" value="1">
      </div>
      <button class="ctrl-btn" id="btn-labels">Labels</button>
      <button class="ctrl-btn" id="btn-cloud">Cloud</button>
      <button class="ctrl-btn" id="btn-reset">Reset</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
(function() {
  const container = document.getElementById('container');
  const loading = document.getElementById('loading');
  const tooltip = document.getElementById('tooltip');
  const infoBadge = document.getElementById('info');
  
  // ---- Electrode data (VGGT world coords, centered) ----
  const ELECTRODES = {

  },
  "E5": {

  },

  "E10": {

    ],

  },
  "E11": {

    ],

  },
  "E12": {

      0.04008781929602634
    ],
    "type": "electrode"
  },
  "E13": {
    "position": [
      0.03361834964585744,
      -0.18361490277473508,
      -0.015570462613094027
    ],
    "type": "electrode"
  },
  "E14": {
    "position": [
      -0.07255158114948679,
      -0.19037779279962957,
      -0.02299926865808477
    ],
    "type": "electrode"
  },
  "E15": {
    "position": [
      -0.08105945041613646,
      -0.17592015776987863,
      0.09636141816443722
    ],
    "type": "electrode"
  },
  "E16": {
    "position": [
      -0.13267108934648353,
      -0.17165601196039548,
      0.022050225368256404
    ],
    "type": "electrode"
  },
  "E17": {
    "position": [
      -0.12129644946939276,
      -0.12613103842694656,
      0.1307921849656848
    ],
    "type": "electrode"
  },
  "E18": {
    "position": [
      -0.0866758283486977,
      -0.033293722752472305,
      0.16569130746283522
    ],
    "type": "electrode"
  },
  "E19": {
    "position": [
      -0.1592241235782991,
      -0.10782572379782739,
      0.07524631534214898
    ],
    "type": "electrode"
  },
  "E20": {
    "position": [
      -0.1737072662297094,
      0.008126566529943285,
      0.06943169385568937
    ],
    "type": "electrode"
  },
  "E21": {
    "position": [
      -0.17458442573617183,
      -0.07679361243979223,
      0.006241463124265323
    ],
    "type": "electrode"
  },
  "E22": {
    "position": [
      -0.14717745855751818,
      -0.08252317039984851,
      -0.07894586592147479
    ],
    "type": "electrode"
  },
  "E23": {
    "position": [
      -0.015527706514160161,
      -0.1738023968877372,
      -0.0767477549347173
    ],
    "type": "electrode"
  }
};
  
  // ---- Scene ----
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0f1923);
  scene.fog = new THREE.FogExp2(0x0f1923, 0.6);
  
  const camera = new THREE.PerspectiveCamera(55, container.clientWidth / container.clientHeight, 0.001, 50);
  camera.position.set(0.1, 0.15, 0.55);
  
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);
  
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.rotateSpeed = 0.7;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.6;
  controls.maxDistance = 3;
  controls.minDistance = 0.1;
  
  // ---- Lights ----
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
  dirLight.position.set(2, 3, 4);
  scene.add(dirLight);
  const backLight = new THREE.DirectionalLight(0x4488cc, 0.3);
  backLight.position.set(-2, -1, -3);
  scene.add(backLight);
  
  // ---- State ----
  let pointCloud = null;
  let electrodeMeshes = [];
  let labelSprites = [];
  let showLabels = false;
  let showCloud = true;
  let initialCamPos, initialTarget;
  
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let hoveredElectrode = null;
  
  // ---- Colors ----
  const COL_ELECTRODE = new THREE.Color(0x00ABD9);
  const COL_ELECTRODE_HOVER = new THREE.Color(0x00E5FF);
  const COL_LANDMARK = new THREE.Color(0xEE7100);
  const COL_LANDMARK_HOVER = new THREE.Color(0xFFAA44);
  
  // ---- Create electrode spheres + labels ----
  function createElectrodes() {
    const elecGeo = new THREE.SphereGeometry(1, 16, 12);
    
    Object.entries(ELECTRODES).forEach(([name, data]) => {
      const isLandmark = data.type === 'landmark';
      const baseColor = isLandmark ? COL_LANDMARK : COL_ELECTRODE;
      const size = isLandmark ? 0.006 : 0.005;
      
      // Sphere
      const mat = new THREE.MeshPhongMaterial({
        color: baseColor,
        emissive: baseColor.clone().multiplyScalar(0.25),
        shininess: 60,
        transparent: true,
        opacity: 0.92,
      });
      const mesh = new THREE.Mesh(elecGeo, mat);
      mesh.position.set(...data.position);
      mesh.scale.setScalar(size);
      mesh.userData = { name, type: data.type, baseColor: baseColor.clone() };
      scene.add(mesh);
      electrodeMeshes.push(mesh);
      
      // Glow ring
      const ringGeo = new THREE.RingGeometry(1.3, 1.7, 24);
      const ringMat = new THREE.MeshBasicMaterial({
        color: baseColor,
        transparent: true,
        opacity: 0.15,
        side: THREE.DoubleSide,
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.position.copy(mesh.position);
      ring.scale.setScalar(size);
      scene.add(ring);
      
      // Text label sprite
      const label = makeTextSprite(name, isLandmark);
      label.position.set(
        data.position[0],
        data.position[1] + size * 2.5,
        data.position[2]
      );
      label.visible = false;
      scene.add(label);
      labelSprites.push(label);
    });
  }
  
  function makeTextSprite(text, isLandmark) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const fontSize = 48;
    canvas.width = 256;
    canvas.height = 80;
    
    ctx.font = `bold ${fontSize}px "Noto Sans", sans-serif`;
    
    // Background pill
    const textWidth = ctx.measureText(text).width;
    const pillW = textWidth + 28;
    const pillH = fontSize + 14;
    const x = (canvas.width - pillW) / 2;
    const y = (canvas.height - pillH) / 2;
    
    ctx.fillStyle = isLandmark ? 'rgba(238,113,0,0.88)' : 'rgba(0,62,107,0.88)';
    ctx.beginPath();
    ctx.roundRect(x, y, pillW, pillH, 12);
    ctx.fill();
    
    // Text
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, canvas.width / 2, canvas.height / 2);
    
    const texture = new THREE.CanvasTexture(canvas);
    texture.minFilter = THREE.LinearFilter;
    
    const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(0.04, 0.012, 1);
    return sprite;
  }
  
  // ---- Load point cloud ----
  function loadBinary(url) {
    return fetch(url).then(r => {
      if (!r.ok) throw new Error('Not found');
      return r.arrayBuffer();
    }).then(buf => {
      const view = new DataView(buf);
      const count = view.getUint32(0, true);
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      let off = 4;
      for (let i = 0; i < count; i++) {
        positions[i*3]     = view.getFloat32(off, true); off += 4;
        positions[i*3 + 1] = view.getFloat32(off, true); off += 4;
        positions[i*3 + 2] = view.getFloat32(off, true); off += 4;
        colors[i*3]     = view.getUint8(off++) / 255;
        colors[i*3 + 1] = view.getUint8(off++) / 255;
        colors[i*3 + 2] = view.getUint8(off++) / 255;
      }
      return { count, positions, colors };
    });
  }
  
  function loadJSON(url) {
    return fetch(url).then(r => {
      if (!r.ok) throw new Error('Not found');
      return r.json();
    }).then(d => ({
      count: d.count,
      positions: new Float32Array(d.positions),
      colors: new Float32Array(d.colors),
    }));
  }
  
  function buildPointCloud(data) {
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(data.positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(data.colors, 3));
    geo.computeBoundingSphere();
    
    const mat = new THREE.PointsMaterial({
      size: 0.003,
      vertexColors: true,
      sizeAttenuation: true,
      transparent: true,
      opacity: 0.7,
    });
    
    pointCloud = new THREE.Points(geo, mat);
    scene.add(pointCloud);
    
    return data.count;
  }
  
  // ---- Init ----
  createElectrodes();
  
  // Fit camera to electrodes
  const elecPositions = Object.values(ELECTRODES).map(e => e.position);
  const center = elecPositions.reduce((a, b) => [a[0]+b[0], a[1]+b[1], a[2]+b[2]], [0,0,0])
    .map(v => v / elecPositions.length);
  controls.target.set(center[0], center[1], center[2]);
  
  // Load point cloud
  loadBinary('vggt_reconstruction.bin')
    .catch(() => loadJSON('vggt_reconstruction.json'))
    .then(data => {
      const n = buildPointCloud(data);
      infoBadge.textContent = `${n.toLocaleString()} points · 24 electrodes · 3 landmarks`;
      
      // Fit camera nicely
      const sphere = pointCloud.geometry.boundingSphere;
      camera.position.set(
        sphere.center.x + sphere.radius * 0.5,
        sphere.center.y + sphere.radius * 0.6,
        sphere.center.z + sphere.radius * 2.0
      );
      controls.target.copy(sphere.center);
      controls.update();
      
      initialCamPos = camera.position.clone();
      initialTarget = controls.target.clone();
      
      loading.classList.add('hidden');
    })
    .catch(err => {
      // Even without point cloud, show electrodes
      console.warn('Point cloud not loaded, showing electrodes only:', err);
      initialCamPos = camera.position.clone();
      initialTarget = controls.target.clone();
      loading.classList.add('hidden');
      infoBadge.textContent = '24 electrodes · 3 landmarks';
    });
  
  // ---- Hover / raycast ----
  function onMouseMove(e) {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(electrodeMeshes);
    
    if (intersects.length > 0) {
      const mesh = intersects[0].object;
      if (hoveredElectrode !== mesh) {
        // Unhover previous
        if (hoveredElectrode) {
          const prev = hoveredElectrode.userData;
          hoveredElectrode.material.color.copy(prev.baseColor);
          hoveredElectrode.material.emissive.copy(prev.baseColor).multiplyScalar(0.25);
          hoveredElectrode.scale.setScalar(prev.type === 'landmark' ? 0.006 : 0.005);
        }
        
        // Hover new
        hoveredElectrode = mesh;
        const ud = mesh.userData;
        const hoverColor = ud.type === 'landmark' ? COL_LANDMARK_HOVER : COL_ELECTRODE_HOVER;
        mesh.material.color.copy(hoverColor);
        mesh.material.emissive.copy(hoverColor).multiplyScalar(0.4);
        mesh.scale.setScalar((ud.type === 'landmark' ? 0.006 : 0.005) * 1.4);
        
        // Tooltip
        tooltip.textContent = ud.name;
        tooltip.className = ud.type === 'landmark' ? 'landmark' : '';
        tooltip.style.display = 'block';
      }
      
      // Position tooltip
      const pos = mesh.position.clone().project(camera);
      const rect2 = renderer.domElement.getBoundingClientRect();
      tooltip.style.left = ((pos.x + 1) / 2 * rect2.width) + 'px';
      tooltip.style.top = ((-pos.y + 1) / 2 * rect2.height) + 'px';
      
      renderer.domElement.style.cursor = 'pointer';
    } else {
      if (hoveredElectrode) {
        const prev = hoveredElectrode.userData;
        hoveredElectrode.material.color.copy(prev.baseColor);
        hoveredElectrode.material.emissive.copy(prev.baseColor).multiplyScalar(0.25);
        hoveredElectrode.scale.setScalar(prev.type === 'landmark' ? 0.006 : 0.005);
        hoveredElectrode = null;
      }
      tooltip.style.display = 'none';
      renderer.domElement.style.cursor = 'grab';
    }
  }
  renderer.domElement.addEventListener('mousemove', onMouseMove);
  
  // ---- Controls UI ----
  document.getElementById('sl-points').addEventListener('input', function(e) {
    if (pointCloud) pointCloud.material.size = parseFloat(e.target.value) * 0.0012;
  });
  
  document.getElementById('sl-elec').addEventListener('input', function(e) {
    const s = parseFloat(e.target.value);
    electrodeMeshes.forEach(m => {
      const base = m.userData.type === 'landmark' ? 0.006 : 0.005;
      m.scale.setScalar(base * s);
    });
  });
  
  const btnLabels = document.getElementById('btn-labels');
  btnLabels.addEventListener('click', function() {
    showLabels = !showLabels;
    btnLabels.classList.toggle('active', showLabels);
    labelSprites.forEach(s => s.visible = showLabels);
  });
  
  const btnCloud = document.getElementById('btn-cloud');
  btnCloud.classList.add('active');
  btnCloud.addEventListener('click', function() {
    showCloud = !showCloud;
    btnCloud.classList.toggle('active', showCloud);
    if (pointCloud) pointCloud.visible = showCloud;
  });
  
  document.getElementById('btn-reset').addEventListener('click', function() {
    if (initialCamPos) camera.position.copy(initialCamPos);
    if (initialTarget) controls.target.copy(initialTarget);
    controls.autoRotate = true;
    controls.update();
  });
  
  controls.addEventListener('start', () => { controls.autoRotate = false; });
  
  // ---- Make label sprites face camera ----
  // (Sprites auto-face camera in Three.js, so this is handled)
  
  // ---- Animate ----
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
  
  // ---- Resize ----
  window.addEventListener('resize', () => {
    const w = container.clientWidth;
    const h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
})();
</script>
</body>
</html>
