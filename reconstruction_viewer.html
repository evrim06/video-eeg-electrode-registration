<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VGGT 3D Reconstruction</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1923;overflow:hidden;font-family:'Noto Sans',-apple-system,sans-serif}
#container{width:100vw;height:100vh;position:relative}canvas{display:block}
#loading{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0f1923;z-index:10;transition:opacity .5s}
#loading.hidden{opacity:0;pointer-events:none}
.spinner{width:36px;height:36px;border:3px solid rgba(0,171,217,.15);border-top-color:#00ABD9;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
#loading span{color:rgba(255,255,255,.5);font-size:13px}
#controls{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:linear-gradient(transparent,rgba(15,25,35,.85));opacity:0;transition:opacity .3s;z-index:5}
#container:hover #controls{opacity:1}
#controls .hint{color:rgba(255,255,255,.4);font-size:11px}
.right-ctrls{display:flex;align-items:center;gap:12px}
.cg{display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.5);font-size:11px}
.cg input{width:55px;height:3px;accent-color:#00ABD9;cursor:pointer}
.cbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.5);font-size:11px;padding:3px 10px;border-radius:4px;cursor:pointer;transition:all .2s}
.cbtn:hover{background:rgba(0,171,217,.15);border-color:rgba(0,171,217,.3);color:rgba(255,255,255,.8)}
#info{position:absolute;top:10px;right:10px;color:rgba(255,255,255,.22);font-size:10px;z-index:5}
</style>
</head>
<body>
<div id="container">
<div id="loading"><div class="spinner"></div><span>Loading 3D reconstruction...</span></div>
<div id="info"></div>
<div id="controls">
<span class="hint">Drag to rotate · Scroll to zoom</span>
<div class="right-ctrls">
<div class="cg"><span>Size</span><input type="range" id="ps" min="1" max="8" step="0.5" value="2.5"></div>
<button class="cbtn" id="rst">Reset</button>
</div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function(){
const container=document.getElementById('container');
const scene=new THREE.Scene();scene.background=new THREE.Color(0x0f1923);
scene.fog=new THREE.FogExp2(0x0f1923,0.7);
const camera=new THREE.PerspectiveCamera(55,container.clientWidth/container.clientHeight,0.01,50);
camera.position.set(0,0.15,1.2);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(container.clientWidth,container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
container.appendChild(renderer.domElement);
const ctrl=new THREE.OrbitControls(camera,renderer.domElement);
ctrl.enableDamping=true;ctrl.dampingFactor=0.06;ctrl.rotateSpeed=0.7;
ctrl.autoRotate=true;ctrl.autoRotateSpeed=0.8;ctrl.maxDistance=5;ctrl.minDistance=0.2;
let pc=null,iCP,iCT;

fetch('vggt_recon.bin')
  .then(r=>{if(!r.ok)throw new Error('Not found');return r.arrayBuffer();})
  .then(buf=>{
    const dv=new DataView(buf);const raw=new Uint8Array(buf);
    const n=dv.getUint32(0,true);
    const pos=new Float32Array(n*3),col=new Float32Array(n*3);
    let o=4;
    for(let i=0;i<n;i++){
      pos[i*3]=dv.getFloat32(o,true);o+=4;
      pos[i*3+1]=dv.getFloat32(o,true);o+=4;
      pos[i*3+2]=dv.getFloat32(o,true);o+=4;
      col[i*3]=raw[o++]/255;col[i*3+1]=raw[o++]/255;col[i*3+2]=raw[o++]/255;
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color',new THREE.BufferAttribute(col,3));
    geo.computeBoundingSphere();
    pc=new THREE.Points(geo,new THREE.PointsMaterial({size:0.0025,vertexColors:true,sizeAttenuation:true,transparent:true,opacity:0.9}));
    scene.add(pc);
    const sp=geo.boundingSphere;
    camera.position.set(sp.center.x+sp.radius*0.3,sp.center.y+sp.radius*0.4,sp.center.z+sp.radius*2);
    ctrl.target.copy(sp.center);ctrl.update();
    iCP=camera.position.clone();iCT=ctrl.target.clone();
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('info').textContent=n.toLocaleString()+' points · VGGT reconstruction';
  })
  .catch(e=>{console.error(e);document.getElementById('loading').querySelector('span').textContent='Failed to load';});

document.getElementById('ps').addEventListener('input',e=>{if(pc)pc.material.size=parseFloat(e.target.value)*0.001;});
document.getElementById('rst').addEventListener('click',()=>{if(iCP){camera.position.copy(iCP);ctrl.target.copy(iCT);ctrl.autoRotate=true;ctrl.update();}});
ctrl.addEventListener('start',()=>{ctrl.autoRotate=false;});
function anim(){requestAnimationFrame(anim);ctrl.update();renderer.render(scene,camera);}anim();
window.addEventListener('resize',()=>{camera.aspect=container.clientWidth/container.clientHeight;camera.updateProjectionMatrix();renderer.setSize(container.clientWidth,container.clientHeight);});
})();
</script>
</body>
</html>
